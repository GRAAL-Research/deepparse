name: Pip Audit

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deepparse and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e .[all]
          pip install pip-audit
      - name: Run pip-audit
        run: |
          pip-audit --desc --skip-editable
